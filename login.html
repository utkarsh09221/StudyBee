<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
    <title>LOGIN</title>
    <style>
        /* CSS for header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #006666;
            padding: 40px;
        }

        .header .logo {
            font-size: 45px;
            font-family: 'Franklin Gothic Medium', cursive;
            color: #fdfefe;
            text-decoration: blink;
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #006666;
            scroll-margin-block: 120px;
        }

        .nav-items a {
            text-decoration: blink;
            font-size: 20px;
            color: #fdfefe;
            padding: 10px 20px;
        }

        /* Custom styles for the form */
        body {
            background-color: #f8f9fa;
        }

        .form1 {
            background-color: #e6e6fa;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 75px 200px;
        }

        .form-group label {
            color: #333333;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #006699;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #FF6633;
            border-color: #0056b3;
        }

        /* Footer styles */
        footer {
            background-color: #202020;
            padding: 15px;
            color: #fff;
            text-align: center;
        }
    </style>
    <script>
        function validateLogin(event) {
            event.preventDefault(); // Prevent form submission
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check static credentials
            if (username === 'abc' && password === '123') {
                window.location.href = 'courses.html'; // Redirect to courses page
            } else {
                alert('Invalid credentials.'); // Show error message
            }
        }
    </script>
</head>
<body>
    <!-- Navigation -->
    <header class="header">
        <div class="logo">𝐒 𝐓 𝐔 𝐃 𝐘 𝐁 𝐄 𝐄</div>
        <nav class="nav-items">
            <a href="welcome.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="register.html" style="font-size: 80%;">
                <i class="fas fa-sign-in-alt"></i> Sign Up
            </a>
        </nav>
    </header>
    <br />
    <br />
    <div class="form1 mt-4">
        <h1 class="text-center">Please Login Here:</h1>
        <hr />
        <form onsubmit="validateLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" class="form-control" id="username" placeholder="Enter Username" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="Enter Password" required />
            </div>
            <a href="courses.html" class="btn btn-primary">Submit</a>

        </form>
    </div>
    <footer>
        <div class="footer-section">
            <p style="color: white;">Copyright &copy; 2023, All Rights Reserved. Our Company <a href="#" style="color: orange;">Utkarsh</a></p>
        </div>
    </footer>
</body>
</html>
